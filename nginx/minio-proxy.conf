# ══════════════════════════════════════════════════════════════════════════════
# MinIO Nginx Reverse Proxy — jaco-image-server
# ══════════════════════════════════════════════════════════════════════════════
#
# Drop this file inside your main server{} block (or include it).
# Requires: nginx/cors-map.conf to be loaded first (via conf.d/).
#
# URL scheme:
#   Public  → https://yourdomain.com/media/YOUR_PUBLIC_BUCKET/{path}
#   Private → https://yourdomain.com/media/YOUR_PRIVATE_BUCKET/{path}?X-Amz-Signature=...
#
# Replace YOUR_PUBLIC_BUCKET and YOUR_PRIVATE_BUCKET with your actual bucket names.
# ══════════════════════════════════════════════════════════════════════════════

# ── Nginx proxy cache for MinIO objects ───────────────────────────────────────
# Place this OUTSIDE the server{} block (e.g. at http{} level or in a conf.d file)
#
# proxy_cache_path /var/cache/nginx/minio
#     levels=1:2
#     keys_zone=minio_cache:20m
#     max_size=10g
#     inactive=7d
#     use_temp_path=off;


# ─────────────────────────────────────────────────────────────────────────────
# PUBLIC BUCKET — served with Nginx cache, CORS controlled, no auth needed
# ─────────────────────────────────────────────────────────────────────────────
location /media/YOUR_PUBLIC_BUCKET/ {

    # Only allow safe read methods
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # Block path traversal attempts
    if ($uri ~* "\.\./") {
        return 400;
    }

    # Never serve executable files that may have been uploaded
    if ($uri ~* \.(php|php5|phtml|sh|py|rb|pl|exe|bat|cmd|jsp|asp|aspx|cgi)$) {
        return 403;
    }

    # Rewrite /media/YOUR_PUBLIC_BUCKET/... → /YOUR_PUBLIC_BUCKET/... on MinIO
    rewrite ^/media/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:9000;
    proxy_set_header Host 127.0.0.1:9000;

    # ── Strip ALL MinIO response headers we don't want to expose ──────────────
    # MinIO CE sends Access-Control-Allow-Origin: * — we replace it with our own
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Max-Age;
    # Hide storage server identity
    proxy_hide_header Server;
    proxy_hide_header X-Amz-Id-2;
    proxy_hide_header X-Amz-Request-Id;
    proxy_hide_header X-Amz-Bucket-Region;

    # ── Nginx proxy cache ─────────────────────────────────────────────────────
    proxy_cache minio_cache;
    proxy_cache_valid 200 7d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_ignore_headers Set-Cookie;
    proxy_hide_header Set-Cookie;
    add_header X-Cache-Status $upstream_cache_status always;

    # ── CORS — controlled by Nginx map (see nginx/cors-map.conf) ─────────────
    # $cors_origin is set to $http_origin only for allowed origins, else ""
    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, HEAD"  always;
    add_header Vary                         "Origin"     always;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Content-Disposition       "inline"                              always;

    # ── Browser cache ─────────────────────────────────────────────────────────
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    expires 30d;

    # ── Proxy buffering ───────────────────────────────────────────────────────
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    access_log off;
}


# ─────────────────────────────────────────────────────────────────────────────
# PRIVATE BUCKET — requires MinIO signed URL (X-Amz-Signature), never cached
# ─────────────────────────────────────────────────────────────────────────────
location /media/YOUR_PRIVATE_BUCKET/ {

    # Reject unsigned requests
    if ($arg_X-Amz-Signature = "") {
        return 403 "Access denied";
    }

    # Only allow safe read methods
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    rewrite ^/media/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:9000;
    proxy_set_header Host 127.0.0.1:9000;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Server;
    proxy_hide_header X-Amz-Id-2;
    proxy_hide_header X-Amz-Request-Id;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    # Private files must not be cached anywhere
    add_header Cache-Control "private, no-store" always;

    # No Nginx cache for private files
    proxy_cache off;

    access_log /var/log/nginx/minio_private_access.log;
}
