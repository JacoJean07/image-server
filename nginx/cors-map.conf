# ══════════════════════════════════════════════════════════════════════════════
# CORS origin map for MinIO proxy
# ══════════════════════════════════════════════════════════════════════════════
#
# Place this file in /etc/nginx/conf.d/ so it loads at the http{} level,
# before any server{} blocks reference the $cors_origin variable.
#
# How it works:
#   - If the request Origin matches an allowed pattern, $cors_origin is set
#     to the actual origin value (echoed back) — required for credentialed CORS.
#   - If no pattern matches, $cors_origin = "" and no CORS header is emitted.
#
# Customize the patterns below for your own domain.
# ══════════════════════════════════════════════════════════════════════════════

map $http_origin $cors_origin {
    default  "";

    # Main domain (with and without www)
    "~^https://(www\.)?yourdomain\.com$"                "http_origin";

    # All tenant subdomains  *.yourdomain.com
    "~^https://[a-z0-9][a-z0-9\-]*\.yourdomain\.com$"  "$http_origin";

    # ── Add more patterns as needed ───────────────────────────────────────────
    # "~^https://partner\.example\.com$"  "$http_origin";
}
