# ══════════════════════════════════════════════════════════════════════════════
# Nginx proxy cache zone for MinIO
# ══════════════════════════════════════════════════════════════════════════════
#
# Place this file in /etc/nginx/conf.d/ so it is loaded at the http{} level.
# The cache path directory must exist and be writable by the nginx user.
#
#   sudo mkdir -p /var/cache/nginx/minio
#   sudo chown www-data:www-data /var/cache/nginx/minio
#
# Tune max_size and inactive to fit your server's disk capacity.
# ══════════════════════════════════════════════════════════════════════════════

proxy_cache_path /var/cache/nginx/minio
    levels=1:2
    keys_zone=minio_cache:20m
    max_size=10g
    inactive=7d
    use_temp_path=off;
